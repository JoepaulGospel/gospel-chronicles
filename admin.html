<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Joepaul Gospel</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-container { max-width: 700px; margin: 100px auto 40px; padding: 0 24px; }
    .login-form, .upload-form { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; padding: 32px; backdrop-filter: blur(10px); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; color: var(--text); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
      border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit;
    }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: rgba(255,255,255,0.3); }
    .btn-primary {
      background: var(--text); color: var(--bg); border: none; padding: 12px 24px; border-radius: 99px;
      font-weight: 600; cursor: pointer; transition: all 0.3s; width: 100%; font-size: 15px;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,255,255,0.15); }
    .btn-secondary {
      background: transparent; color: var(--text-muted); border: 1px solid var(--glass-border);
      padding: 10px 20px; border-radius: 99px; cursor: pointer; transition: 0.2s; font-size: 14px;
    }
    .btn-secondary:hover { background: var(--glass-hover); color: var(--text); }
    .hidden { display: none !important; }
    .upload-preview { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 14px; }
    .project-list { margin-top: 40px; }
    .project-item {
      background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px;
      margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
    }
    .project-item h4 { font-size: 16px; margin-bottom: 4px; color: var(--text); }
    .project-item p { font-size: 13px; color: var(--text-muted); }
    .delete-btn { color: #ef4444; background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 500; }
    .delete-btn:hover { text-decoration: underline; }
    .status-msg { padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .status-success { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
    .status-error { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .admin-header h2 { font-size: 24px; margin: 0; }
  </style>
</head>
<body>
  <div class="bg-layer">
    <div class="stars"></div>
    <div class="nebula"></div>
    <div class="noise"></div>
  </div>

  <div class="admin-container">
    <!-- Login Form -->
    <div id="login-section" class="login-form">
      <h2 style="margin-bottom: 24px; font-size: 24px; color: var(--text);">Admin Login</h2>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="admin-email" placeholder="admin@joepaul.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="admin-password" placeholder="••••••••">
      </div>
      <button id="login-btn" class="btn-primary">Login</button>
      <p id="login-error" class="status-msg status-error hidden"></p>
    </div>

    <!-- Upload Form (Hidden until logged in) -->
    <div id="upload-section" class="upload-form hidden">
      <div class="admin-header">
        <h2>Upload Project</h2>
        <button id="logout-btn" class="btn-secondary">Logout</button>
      </div>
      
      <div id="upload-status" class="status-msg hidden"></div>
      
      <div class="form-group">
        <label>Project Title *</label>
        <input type="text" id="project-title" placeholder="e.g. E-Commerce Redesign" required>
      </div>
      
      <div class="form-group">
        <label>Category</label>
        <select id="project-category">
          <option value="Web Development">Web Development</option>
          <option value="UI/UX Design">UI/UX Design</option>
          <option value="Motion & Video">Motion & Video</option>
          <option value="Brand Identity">Brand Identity</option>
          <option value="Other">Other</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Description</label>
        <textarea id="project-description" rows="3" placeholder="Brief description of the project..."></textarea>
      </div>
      
      <div class="form-group">
        <label>Live Project Link (optional)</label>
        <input type="url" id="project-link" placeholder="https://your-project.com">
      </div>
      
      <div class="form-group">
        <label>Video File (MP4, up to 3GB) *</label>
        <input type="file" id="video-file" accept="video/mp4" required>
        <div id="video-preview" class="upload-preview">No video selected</div>
      </div>
      
      <div class="form-group">
        <label>Thumbnail Image (optional, JPG/PNG)</label>
        <input type="file" id="thumbnail-file" accept="image/jpeg,image/png">
      </div>
      
      <button id="upload-btn" class="btn-primary">Upload to Portfolio</button>
      
      <!-- Existing Projects List -->
      <div class="project-list" id="project-list">
        <h3 style="margin: 32px 0 16px; font-size: 18px; color: var(--text);">Your Projects</h3>
        <div id="projects-container"></div>
      </div>
    </div>
  </div>

  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
